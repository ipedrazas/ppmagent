# Taskfile for ppmagent — https://taskfile.dev
# Run `task` (or `task --list`) to see available tasks.
#
# Tasks invoke the local binaries directly (./node_modules/.bin) rather than
# `bun run <script>`, so they work both in CI and inside restrictive local
# sandboxes. The equivalent `package.json` scripts exist for direct `bun run`.
version: "3"

vars:
  BIN: ./node_modules/.bin
  # Container image coordinates — mirror the GHCR target used by the release
  # workflow. Override on the CLI, e.g. `task docker:build TAG=dev`.
  IMAGE: ghcr.io/ipedrazas/ppmagent
  TAG: latest

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list
    silent: true

  install:
    desc: Install dependencies (frozen lockfile)
    cmds:
      - bun install --frozen-lockfile

  install:dev:
    desc: Install dependencies and update the lockfile if needed
    cmds:
      - bun install

  deps:
    desc: Install everything needed to develop and run the project (Node deps, Biome, tsc)
    cmds:
      - bun install
      - "{{.BIN}}/biome --version"
      - "{{.BIN}}/tsc --version"

  setup:
    desc: One-time project setup — install deps and prepare a local .env
    cmds:
      - task: deps
      - cmd: test -f .env || cp .env.example .env
      - 'echo "Setup complete. Fill in secrets in .env, then run: task dev"'

  typecheck:
    desc: Typecheck with tsc (no emit)
    cmds:
      - "{{.BIN}}/tsc --noEmit"

  lint:
    desc: Lint and format-check with Biome
    cmds:
      - "{{.BIN}}/biome check ."

  format:
    desc: Auto-format and apply safe fixes with Biome
    cmds:
      - "{{.BIN}}/biome check --write ."

  test:
    desc: Run the test suite
    cmds:
      - bun test

  evals:
    desc: Run the real-model eval suite (needs `ppm` + a real provider API key; costs tokens, never run in CI)
    cmds:
      - bun evals/run.ts

  dev:
    desc: Run the agent in watch mode
    cmds:
      - bun --watch src/index.ts

  start:
    desc: Run the agent
    cmds:
      - bun src/index.ts

  docker:build:
    desc: Build the container image locally (override IMAGE/TAG as needed)
    cmds:
      - docker build -t {{.IMAGE}}:{{.TAG}} .

  check:
    desc: Typecheck + lint + test (fast local gate)
    cmds:
      - task: typecheck
      - task: lint
      - task: test

  ci:
    desc: What CI runs — install then full check
    cmds:
      - task: install
      - task: check
