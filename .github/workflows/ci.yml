name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Required so the check runs on merge-queue batches; without this a merge
  # queue waits forever for a check that never dispatches. See the merge-gate
  # ruleset in .github/rulesets/main-merge-gate.json (TAV-70).
  merge_group:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: typecheck · lint · test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Install ppm (memory CLI used by integration tests)
        run: |
          go install github.com/ipedrazas/ppm@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint & format check
        run: bun run lint

      - name: Test
        run: bun test
