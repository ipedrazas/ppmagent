# Local / single-host run of the agent.
#   docker compose up --build        # build locally and run
#   docker compose pull && up        # run the published GHCR image
#
# Override the image tag with IMAGE_TAG (defaults to `latest`).
name: ppmagent

services:
  agent:
    image: ghcr.io/ipedrazas/ppmagent:${IMAGE_TAG:-latest}
    build:
      context: .
      args:
        PPM_VERSION: ${PPM_VERSION:-latest}
        # Must stay in sync with the Dockerfile ARG default: older dbxcli
        # releases use a different --filter grammar than the tracker tools
        # advertise, so a skewed pin breaks every filtered list call.
        DBXCLI_VERSION: ${DBXCLI_VERSION:-v0.1.12}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Keep memory on the mounted volume regardless of what .env says.
      PPM_MEMORY_ROOT: /app/memory
    volumes:
      - .memory:/app/memory
      # ── dbxcli (tracker) is baked into the image; it still needs the
      #    DataboxPPM config/token at runtime. Supply the token via .env, or
      #    mount a config file and point PPMA_DBXCLI_CONFIG at it in .env:
      # - ${HOME}/Workspace/github.com/tavon/ppm-config.json:/app/ppm-config.json:ro
      #   then set in .env:  PPMA_DBXCLI_CONFIG=/app/ppm-config.json
