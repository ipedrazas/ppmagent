# A2 Configuration
# Generated by: a2 init
#
# Run checks with: a2 check
# List all checks: a2 list checks   ·   Explain one: a2 explain <id>

# Languages to check. Commented out = auto-detect from the repo.
language:
  explicit: [typescript]

# Files that must exist in the repository root.
files:
  required:
    - README.md
    - LICENSE

# Minimum test-coverage percentage enforced by the coverage checks.
coverage:
  threshold: 40

# How checks are executed.
execution:
  parallel: true # run checks concurrently
  # concurrency: 0    # max checks at once (0 = number of CPUs)

# Disable individual checks by ID (see 'a2 list checks').
checks:
  disabled:
    - common:health
    - security:*
    - devops:*
    - common:tracing
    - common:errors
    - common:shutdown
    - common:migrations
    - common:api_docs
    - common:dockerfile
    - common:metrics
    - common:e2e
    - common:naming
    - common:retry
    - common:duplication
    - common:license

# Custom checks that run any shell command.
# external:
#   - id: lint
#     name: golangci-lint
#     command: golangci-lint
#     args: ["run", "./..."]
#     severity: warn    # warn | fail
#     speed: slow       # slow checks are skipped by 'a2 check --quick'
